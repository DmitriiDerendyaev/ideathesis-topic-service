  ```yaml
  openapi: 3.0.3
  info:
    title: Topic Service API
    description: API for managing thesis topics, including generation, selection, status updates, and comments.
    version: 1.0.0
  servers:
    - url: http://localhost:8084
      description: Local development server
  paths:
    /api/topics/generate:
      post:
        summary: Generate and save new thesis topics
        operationId: generateTopics
        tags:
          - Topics
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateTopicRequest'
        parameters:
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
        responses:
          '200':
            description: Successfully generated topics
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/GenerateTopicResponse'
          '400':
            description: Invalid request or student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/select:
      post:
        summary: Select a topic for a student
        operationId: selectTopic
        tags:
          - Topics
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelectTopicRequest'
        parameters:
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
        responses:
          '200':
            description: Topic successfully selected
          '400':
            description: Invalid request or student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/status:
      post:
        summary: Update the status of a topic
        operationId: updateTopicStatus
        tags:
          - Topics
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicStatusUpdateRequest'
        parameters:
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
        responses:
          '200':
            description: Topic status successfully updated
            content:
              application/json:
                schema:
                  type: string
                  example: Статус темы успешно обновлен
          '400':
            description: Invalid request or student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/history:
      get:
        summary: Get paginated history of generated topics for a student
        operationId: getLastTenTopics
        tags:
          - Topics
        parameters:
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
          - name: page
            in: query
            required: false
            schema:
              type: integer
              default: 0
            description: Page number (0-based)
          - name: size
            in: query
            required: false
            schema:
              type: integer
              default: 10
            description: Number of items per page
        responses:
          '200':
            description: Successfully retrieved topic history
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PaginatedResponseGeneratedTopicDto'
          '400':
            description: Invalid student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/history/legacy:
      get:
        summary: Get legacy topic history (non-paginated, deprecated)
        operationId: getLastTenTopicsLegacy
        tags:
          - Topics
        parameters:
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
        responses:
          '200':
            description: Successfully retrieved legacy topic history
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/GenerateTopicResponse'
          '400':
            description: Invalid student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/{topicId}/history:
      get:
        summary: Get change history for a specific topic
        operationId: getTopicHistory
        tags:
          - Topics
        parameters:
          - name: topicId
            in: path
            required: true
            schema:
              type: integer
              format: int64
            description: ID of the topic
        responses:
          '200':
            description: Successfully retrieved topic change history
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/TopicChangeLogDto'
          '400':
            description: Invalid topic ID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/students/{studentGuid}/topics/active:
      get:
        summary: Get active topics for a student
        operationId: getActiveTopicsForStudent
        tags:
          - Topics
        parameters:
          - name: studentGuid
            in: path
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
          - name: status
            in: query
            required: false
            schema:
              $ref: '#/components/schemas/TopicStatus'
            description: Filter by topic status
        responses:
          '200':
            description: Successfully retrieved active topics
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/StudentTopicSelectionDto'
          '400':
            description: Invalid student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/topics/{topicId}/withdraw:
      post:
        summary: Withdraw a topic selection
        operationId: withdrawTopic
        tags:
          - Topics
        parameters:
          - name: topicId
            in: path
            required: true
            schema:
              type: integer
              format: int64
            description: ID of the topic to withdraw
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
        responses:
          '200':
            description: Topic successfully withdrawn
          '400':
            description: Invalid topic ID or student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/{topicId}/comments:
      post:
        summary: Add a comment to a topic
        operationId: addComment
        tags:
          - Comments
        parameters:
          - name: topicId
            in: path
            required: true
            schema:
              type: integer
              format: int64
            description: ID of the topic
          - name: X-Student-Guid
            in: header
            required: false
            schema:
              type: string
              format: uuid
            description: UUID of the student (mutually exclusive with X-Teacher-Guid)
          - name: X-Teacher-Guid
            in: header
            required: false
            schema:
              type: string
              format: uuid
            description: UUID of the teacher (mutually exclusive with X-Student-Guid)
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddCommentRequest'
        responses:
          '200':
            description: Comment successfully added
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TopicCommentDto'
          '400':
            description: Invalid request or missing/invalid GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      get:
        summary: Get comments for a topic
        operationId: getCommentsForTopic
        tags:
          - Comments
        parameters:
          - name: topicId
            in: path
            required: true
            schema:
              type: integer
              format: int64
            description: ID of the topic
        responses:
          '200':
            description: Successfully retrieved comments
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/TopicCommentDto'
          '400':
            description: Invalid topic ID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/{topicId}:
      get:
        summary: Get details of a specific topic
        operationId: getTopic
        tags:
          - Topics
        parameters:
          - name: topicId
            in: path
            required: true
            schema:
              type: integer
              format: int64
            description: ID of the topic
        responses:
          '200':
            description: Successfully retrieved topic details
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/GeneratedTopicDto'
          '400':
            description: Invalid topic ID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      put:
        summary: Update a topic
        operationId: updateTopic
        tags:
          - Topics
        parameters:
          - name: topicId
            in: path
            required: true
            schema:
              type: integer
              format: int64
            description: ID of the topic
          - name: X-Student-Guid
            in: header
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTopicRequest'
        responses:
          '200':
            description: Topic successfully updated
          '400':
            description: Invalid request or student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/students/{studentGuid}/topics/generated:
      get:
        summary: Get paginated list of generated topics for a student
        operationId: getGeneratedTopicsForStudent
        tags:
          - Topics
        parameters:
          - name: studentGuid
            in: path
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the student
          - name: page
            in: query
            required: false
            schema:
              type: integer
              default: 0
            description: Page number (0-based)
          - name: size
            in: query
            required: false
            schema:
              type: integer
              default: 10
            description: Number of items per page
        responses:
          '200':
            description: Successfully retrieved generated topics
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PaginatedResponseGeneratedTopicDto'
          '400':
            description: Invalid student GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /api/topics/teachers/{teacherGuid}/topics/pending:
      get:
        summary: Get pending topic selections for a teacher
        operationId: getPendingTopicsForTeacher
        tags:
          - Topics
        parameters:
          - name: teacherGuid
            in: path
            required: true
            schema:
              type: string
              format: uuid
            description: UUID of the teacher
        responses:
          '200':
            description: Successfully retrieved pending topics
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/PendingTopicSelectionDto'
          '400':
            description: Invalid teacher GUID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  components:
    schemas:
      GenerateTopicRequest:
        type: object
        required:
          - competencies
          - areaOfStudy
          - educationLevel
        properties:
          competencies:
            type: string
            description: Student's competencies
          areaOfStudy:
            type: string
            description: Area of study
          educationLevel:
            type: string
            description: Education level (e.g., BACHELOR, MASTER)
      GenerateTopicResponse:
        type: object
        properties:
          topics:
            type: array
            items:
              $ref: '#/components/schemas/GeneratedTopicDto'
      GeneratedTopicDto:
        type: object
        properties:
          id:
            type: integer
            format: int64
            description: Topic ID
          title:
            type: string
            description: Topic title
          description:
            type: string
            description: Topic description
          actuality:
            type: string
            description: Topic actuality
          problems:
            type: string
            description: Problems addressed by the topic
          recommendedSkills:
            type: array
            items:
              type: string
            description: Recommended skills for the topic
          status:
            $ref: '#/components/schemas/TopicStatus'
      TopicStatus:
        type: string
        enum:
          - DRAFT
          - PENDING
          - APPROVED
          - REJECTED
          - WITHDRAWN
        description: Status of the topic
      SelectTopicRequest:
        type: object
        required:
          - topicId
          - supervisorGuid
        properties:
          topicId:
            type: integer
            format: int64
            description: ID of the topic to select
          supervisorGuid:
            type: string
            format: uuid
            description: UUID of the supervisor
      TopicStatusUpdateRequest:
        type: object
        required:
          - topicId
          - status
        properties:
          topicId:
            type: integer
            format: int64
            description: ID of the topic
          status:
            $ref: '#/components/schemas/TopicStatus'
      TopicChangeLogDto:
        type: object
        properties:
          id:
            type: integer
            format: int64
            description: Change log ID
          topicId:
            type: integer
            format: int64
            description: ID of the topic
          studentGuid:
            type: string
            format: uuid
            description: UUID of the student
          title:
            type: string
            description: Topic title at the time of change
          description:
            type: string
            description: Topic description at the time of change
          actuality:
            type: string
            description: Topic actuality at the time of change
          problems:
            type: string
            description: Problems addressed at the time of change
          status:
            $ref: '#/components/schemas/TopicStatus'
          changeTime:
            type: string
            format: date-time
            description: Timestamp of the change
          skills:
            type: array
            items:
              type: string
            description: Skills at the time of change
      StudentTopicSelectionDto:
        type: object
        properties:
          topic:
            $ref: '#/components/schemas/GeneratedTopicDto'
          supervisorGuid:
            type: string
            format: uuid
            description: UUID of the supervisor
      TopicCommentDto:
        type: object
        properties:
          id:
            type: integer
            format: int64
            description: Comment ID
          topicId:
            type: integer
            format: int64
            description: ID of the topic
          authorType:
            type: string
            enum:
              - STUDENT
              - TEACHER
            description: Type of the comment author
          authorGuid:
            type: string
            format: uuid
            description: UUID of the comment author
          commentText:
            type: string
            description: Text of the comment
          createdAt:
            type: string
            format: date-time
            description: Timestamp of comment creation
          parentCommentId:
            type: integer
            format: int64
            nullable: true
            description: ID of the parent comment (if any)
      AddCommentRequest:
        type: object
        required:
          - commentText
        properties:
          commentText:
            type: string
            description: Text of the comment
          parentCommentId:
            type: integer
            format: int64
            nullable: true
            description: ID of the parent comment (if any)
      UpdateTopicRequest:
        type: object
        required:
          - title
          - description
          - actuality
          - problems
        properties:
          title:
            type: string
            description: Updated topic title
          description:
            type: string
            description: Updated topic description
          actuality:
            type: string
            description: Updated topic actuality
          problems:
            type: string
            description: Updated problems addressed
          recommendedSkills:
            type: array
            items:
              type: string
            description: Updated recommended skills
      PendingTopicSelectionDto:
        type: object
        properties:
          topic:
            $ref: '#/components/schemas/GeneratedTopicDto'
          studentGuid:
            type: string
            format: uuid
            description: UUID of the student
          supervisorGuid:
            type: string
            format: uuid
            description: UUID of the supervisor
      PaginatedResponseGeneratedTopicDto:
        type: object
        properties:
          content:
            type: array
            items:
              $ref: '#/components/schemas/GeneratedTopicDto'
          page:
            type: integer
            description: Current page number
          size:
            type: integer
            description: Number of items per page
          totalElements:
            type: integer
            format: int64
            description: Total number of items
          totalPages:
            type: integer
            description: Total number of pages
      ErrorResponse:
        type: object
        properties:
          message:
            type: string
            description: Error message
          status:
            type: integer
            description: HTTP status code
          timestamp:
            type: string
            format: date-time
            description: Timestamp of the error
    ```